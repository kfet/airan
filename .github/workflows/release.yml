name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.21"
          cache: false

      - name: Guard release version (monotonic + matches VERSION)
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet || true
          TAG="${GITHUB_REF_NAME}"
          if [ -f VERSION ]; then
            VER="$(tr -d '[:space:]' < VERSION)"
            if [ "v$VER" != "$TAG" ]; then
              echo "::error::VERSION file ($VER) does not match pushed tag ($TAG)"
              exit 1
            fi
          fi
          PREV="$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)"
          if [ -n "$PREV" ]; then
            TOP="$(printf '%s\n%s\n' "${TAG#v}" "${PREV#v}" | sort -V | tail -1)"
            if [ "$TOP" != "${TAG#v}" ]; then
              echo "::error::refusing backwards release: $TAG is not greater than existing latest $PREV"
              exit 1
            fi
          fi
          echo "release guard OK: $TAG > ${PREV:-<none>}"

      - name: Build Matrix
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF#refs/tags/}"
          
          # Supported architectures
          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
            "linux/386"
            "linux/arm"
            "freebsd/amd64"
            "freebsd/386"
            "windows/amd64"
            "windows/386"
            "windows/arm64"
          )
          
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi
            
            OUT="dist/airan-${GOOS}-${GOARCH}${EXT}"
            echo "Building $OUT..."
            env GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w" -o "$OUT" ./cmd/airan
          done

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
